<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alessandro — Contact Interface</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Alessandro</h1>

  <h2 id="dynamicTitle"></h2>

  <div class="section">
    <p>
      Sistemi embedded, integrazione hardware/software,
      Linux embedded, IoT e automazione.
    </p>
  </div>

  <div class="tags">
    <span>ESP32</span>
    <span>BLE</span>
    <span>KNX</span>
    <span>Linux Embedded</span>
  </div>

  <div class="section">
    <p>
      Se ritieni possa esserci un’intersezione interessante,
      puoi lasciare un messaggio.
    </p>
  </div>

  <form action="https://docs.google.com/forms/d/e/1FAIpQLSc7OoTgiHAasLa1pzST48ZMhTeoUIYg8Tq1XlodxDKHy7TBqg/formResponse" method="POST target="hidden_iframe">

    <input type="hidden" id="source" name="source">
    
    <input name="entry.173291699"
       type="text"
       placeholder="Nome">

    <input type="email"
           name="entry.272260102"
           placeholder="Email (facoltativa)">

    <textarea name="entry.2024079344"
              placeholder="Messaggio"
              required></textarea>
    
    <label class="checkbox">
      <input type="checkbox" required>
      Desidero essere ricontattato
    </label>

    <button type="submit">
      Invia
    </button>

  </form>

  <footer>
    Minimal contact interface — Lombardia
  </footer>

  <iframe
   name="hidden_iframe"
   style="display:none;">
  </iframe>
  
</div>
  
<script>
  const params = new URLSearchParams(window.location.search);
  const source = params.get('source') || 'generic';
  document.getElementById('source').value = source;

  const titles = {
    ble: "BLE • Wireless Systems",
    knx: "KNX • Building Automation",
    iiot: "Industrial IoT • Automation",
    recruiting: "Technical Profile"
  };

  document.getElementById("dynamicTitle").innerText = titles[source] || "Embedded Systems";

</script>
  
</body>
</html>
