<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alessandro — Contact Interface</title>
  <p id="debug"></p>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Alessandro</h1>

  <h2 id="dynamicTitle"></h2>

  <div class="section">
    <p>
      Sistemi embedded, integrazione hardware/software,
      Linux embedded, IoT e automazione.
    </p>
  </div>

  <div class="tags">
    <span>ESP32</span>
    <span>BLE</span>
    <span>KNX</span>
    <span>Linux Embedded</span>
  </div>

  <div class="section">
    <p>
      Se ritieni possa esserci un’intersezione interessante,
      puoi lasciare un messaggio.
    </p>
  </div>

<p id="successMessage" style="display:none;">
  Messaggio inviato.
</p>
  
  <form id="contactForm" action="https://docs.google.com/forms/d/e/1FAIpQLSc7OoTgiHAasLa1pzST48ZMhTeoUIYg8Tq1XlodxDKHy7TBqg/formResponse" method="POST" target="hidden_iframe">

    <input type="hidden"
           id="source"
           name="entry.875365765">
    
    <input name="entry.1732916996"
       type="text"
       placeholder="Nome">

    <input type="email"
           name="entry.272260102"
           placeholder="Email (facoltativa)">

    <textarea name="entry.2024079344"
              placeholder="Messaggio"
              required></textarea>
    
    <label class="checkbox">
      <input type="checkbox">
      Desidero essere ricontattato
    </label>

    <button type="submit">
      Invia
    </button>

  </form>

  <footer>
    Minimal contact interface — Lombardia
  </footer>

  <iframe
   name="hidden_iframe"
   style="display:none;">
  </iframe>
  
</div>
  
<script>
  document.getElementById("debug").innerText =
  "SOURCE = " + source;
  
  const params = new URLSearchParams(window.location.search);
  const source = params.get('src') || 'generic';
  document.getElementById('source').value = source;

  const titles = {
    ble: "BLE • Wireless Systems",
    knx: "KNX • Building Automation",
    iiot: "Industrial IoT • Automation",
    recruiting: "Technical Profile"
  };

  document.getElementById("dynamicTitle").innerText = titles[source] || "Embedded Systems";

  const form = document.getElementById("contactForm");
  form.addEventListener("submit", () => {
  setTimeout(() => {
    form.style.display = "none";
    document.getElementById("successMessage").style.display = "block";
  }, 500);
});

</script>
  
</body>
</html>
